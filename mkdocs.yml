site_name: OneNote to Obsidian
site_url: https://lenivvenil.github.io/onenote-to-obsidian/
site_description: Export OneNote notebooks to Obsidian-compatible Markdown. One command, all your notes.
site_author: Ivan Kuzmin

repo_name: Lenivvenil/onenote-to-obsidian
repo_url: https://github.com/Lenivvenil/onenote-to-obsidian

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/landing.css

exclude_docs: |
  principles.md
  decisions/
  domain/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list

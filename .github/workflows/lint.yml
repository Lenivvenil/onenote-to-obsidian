name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check onenote_to_obsidian/

      - name: Check linting
        run: ruff check onenote_to_obsidian/
